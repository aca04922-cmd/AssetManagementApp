<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編集画面</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <header class="header">
        <div class="logout-wrapper">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">ログアウト</button>
            </form>
        </div>
    </header>

    <div class="container edit-form-container">

        <h2>編集画面</h2>

        <form th:action="@{/confirm-edit-asset}"
              method="post"
              th:object="${editAssetForm}"
              onsubmit="removeCommasBeforeSubmit()">

            <input type="hidden" th:field="*{assetId}">

            <div th:if="${#fields.hasErrors('assetId')}" class="error">
                <p th:errors="*{assetId}"></p>
            </div>

            <div class="form-group">
                <label for="assetName">資産名</label>

                <input type="text"
                       th:field="*{assetName}"
                       id="assetName">

                <div th:if="${#fields.hasErrors('assetName')}" class="error">
                    <p th:errors="*{assetName}"></p>
                </div>
            </div>

            <div class="form-group">
                <label for="institution">利用金融機関</label>

                <select th:field="*{institutionId}" id="institution">
                    <option value="">--金融機関を選択してください--</option>

                    <option th:each="list : ${institutionList}"
                            th:value="${list.institutionId}"
                            th:text="${list.institutionName}">
                    </option>

                </select>

                <div th:if="${#fields.hasErrors('institutionId')}" class="error">
                    <p th:errors="*{institutionId}"></p>
                </div>
            </div>

            <div class="form-group">
                <label for="valuationAmount">評価額</label>

                <input type="text"
                       id="valuationAmount"
                       name="valuationAmount"
                       class="comma-input"
                       th:value="${#numbers.formatInteger(editAssetForm.valuationAmount,1,'COMMA')}">

                <div th:if="${#fields.hasErrors('valuationAmount')}" class="error">
                    <p th:errors="*{valuationAmount}"></p>
                </div>
            </div>

            <div class="form-group">
                <label for="acquisitionAmount">取得額</label>

                <input type="text"
                       id="acquisitionAmount"
                       name="acquisitionAmount"
                       class="comma-input"
                       th:value="${#numbers.formatInteger(editAssetForm.acquisitionAmount,1,'COMMA')}">

                <div th:if="${#fields.hasErrors('acquisitionAmount')}" class="error">
                    <p th:errors="*{acquisitionAmount}"></p>
                </div>
            </div>

            <button type="submit" class="btn-common update">
                確認する
            </button>

        </form>

        <a th:href="@{/show-asset-list}" class="btn-secondary">
            資産一覧に戻る
        </a>

    </div>

    <script>
        document.querySelectorAll('.comma-input').forEach(input => {

            input.addEventListener('input', function () {

                let value = this.value.replace(/,/g, '');

                if (!isNaN(value) && value !== '') {
                    this.value = Number(value).toLocaleString();
                }

            });

        });

        function removeCommasBeforeSubmit() {

            document.querySelectorAll('.comma-input').forEach(input => {
                input.value = input.value.replace(/,/g, '');
            });

        }
    </script>

</body>

</html>
